  <rect x="14" y="14" width="3" height="3" rx="0.5"/>
  <rect x="20" y="14" width="3" height="3" rx="0.5"/>
  <rect x="27" y="14" width="3" height="3" rx="0.5"/>
  <rect x="14" y="20" width="3" height="3" rx="0.5"/>
  <rect x="20" y="20" width="3" height="3" rx="0.5"/>
  <rect x="26" y="20" width="3" height="3" rx="0.5"/>
  <rect x="14" y="27" width="3" height="3" rx="0.5"/>
  <rect x="20" y="26" width="3" height="3" rx="0.5"/>
  <rect x="26" y="26" width="3" height="3" rx="0.5"/>
</svg>
